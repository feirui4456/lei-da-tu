<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五边形雷达图 - 纯透明背景粒子版</title>
    <style>
        body {
            /* 【核心改动】彻底移除暗色背景，设为全透明，方便你嵌入到任何父级容器或大屏中 */
            background: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 240x240px 严格控标主容器 */
        .radar-component {
            position: relative;
            width: 240px;
            height: 240px;
            background: transparent; /* 组件容器自身保持全透明 */
            user-select: none;
        }

        /* 绘图层 Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* HTML 文字标签样式 */
        .radar-label {
            position: absolute;
            z-index: 5; 
            font-size: 11px;
            color: #ffffff;
            line-height: 1.2;
            text-align: center;
            cursor: pointer;
            width: 60px; 
            word-wrap: break-word;
            white-space: normal;
            /* 增强文字阴影，确保在浅色或多变背景下依然清晰可见 */
            text-shadow: 0 1px 3px rgba(0, 229, 255, 0.8), 0 2px 4px rgba(0,0,0,0.8);
            transition: transform 0.2s, color 0.2s;
        }

        .radar-label:hover {
            color: #00e5ff;
        }

        /* 等宽数字，绝对防抖 */
        .label-val {
            display: block;
            font-size: 10px;
            color: #00e5ff;
            font-weight: bold;
            font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
            width: 100%;
            text-align: center;
        }

        /* 5个顶点的精细化定位坐标 */
        .label-0 { top: 14px; left: 50%; transform: translateX(-50%); }
        .label-0:hover { transform: translateX(-50%) scale(1.05); }
        
        .label-1 { top: 66px; right: 12px; text-align: right; }
        .label-1:hover { transform: scale(1.05); }

        .label-2 { bottom: 28px; right: 42px; text-align: right; }
        .label-2:hover { transform: scale(1.05); }

        .label-3 { bottom: 28px; left: 42px; text-align: left; }
        .label-3:hover { transform: scale(1.05); }

        .label-4 { top: 66px; left: 12px; text-align: left; }
        .label-4:hover { transform: scale(1.05); }

        /* --- 严格限制在 240x240 范围内的内嵌设置框 --- */
        .radar-setting-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 145px;
            padding: 10px;
            /* 设置框本身保留微弱的半透明深色，防止背景太杂乱时看不清输入内容 */
            background: rgba(16, 28, 55, 0.98); 
            border: 1px solid #00e5ff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            z-index: 10; 
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .radar-setting-box.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .setting-group {
            margin-bottom: 8px;
            text-align: left;
        }

        .setting-label {
            color: #00e5ff;
            font-size: 10px;
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }

        .input-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            padding: 3px 4px;
            box-sizing: border-box;
            outline: none;
        }
        
        .input-control:focus { border-color: #00e5ff; }

        .value-input-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .value-input-wrap .input-control {
            width: 50px;
            text-align: center;
        }
        .input-unit { color: #fff; font-size: 11px; }

        .setting-btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 10px;
        }

        .setting-btn {
            border: none;
            padding: 4px 12px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-confirm { background: #00e5ff; color: #0e1628; }
        .btn-confirm:hover { background: #00b0ff; }
        .btn-cancel { background: rgba(255, 255, 255, 0.15); color: #eee; }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.25); }
    </style>
</head>
<body>

    <div class="radar-component" id="radarComponent">
        <canvas id="radarCanvas"></canvas>
        
        <div class="radar-label label-0" data-index="0">
            <span class="label-txt">综合力量评估</span><span class="label-val">80%</span>
        </div>
        <div class="radar-label label-1" data-index="1">
            <span class="label-txt">反应敏捷度</span><span class="label-val">65%</span>
        </div>
        <div class="radar-label label-2" data-index="2">
            <span class="label-txt">战术智力</span><span class="label-val">75%</span>
        </div>
        <div class="radar-label label-3" data-index="3">
            <span class="label-txt">策略防线</span><span class="label-val">50%</span>
        </div>
        <div class="radar-label label-4" data-index="4">
            <span class="label-txt">作战耐力</span><span class="label-val">90%</span>
        </div>

        <div class="radar-setting-box" id="settingBox">
            <div class="setting-group">
                <label class="setting-label">维度名称</label>
                <input type="text" class="input-control" id="inputName" placeholder="请输入名称">
            </div>
            <div class="setting-group">
                <label class="setting-label">当前占比</label>
                <div class="value-input-wrap">
                    <input type="text" class="input-control" id="inputValue" maxlength="3">
                    <span class="input-unit">%</span>
                </div>
            </div>
            <div class="setting-btn-group">
                <button class="setting-btn btn-cancel" id="btnCancel">取消</button>
                <button class="setting-btn btn-confirm" id="btnConfirm">确定</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        
        const settingBox = document.getElementById('settingBox');
        const inputName = document.getElementById('inputName');
        const inputValue = document.getElementById('inputValue');
        const btnCancel = document.getElementById('btnCancel');
        const btnConfirm = document.getElementById('btnConfirm');

        // Canvas 尺寸控制
        const size = 240;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        ctx.scale(dpr, dpr);

        const center = size / 2; 
        const maxRadius = 66; 
        const totalSides = 5;
        let activeIndex = null;  

        // 核心数据源
        const radarData = [
            { name: '综合力量评估', value: 0.80, curValue: 0 },
            { name: '反应敏捷度', value: 0.65, curValue: 0 },
            { name: '战术智力', value: 0.75, curValue: 0 },
            { name: '策略防线', value: 0.50, curValue: 0 },
            { name: '作战耐力', value: 0.90, curValue: 0 }
        ];

        // --- 火星粒子系统 ---
        let particles = [];
        class SparkParticle {
            constructor() {
                this.x = center;
                this.y = center;
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.4 + Math.random() * 0.9;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = 0.5 + Math.random() * 1.2;
                this.alpha = 1.0;
                this.decay = 0.015 + Math.random() * 0.02; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${this.alpha})`;
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#00e5ff';
                ctx.fill();
                ctx.restore();
            }
        }

        // 标签点击激活
        document.querySelectorAll('.radar-label').forEach(labelDiv => {
            labelDiv.addEventListener('click', () => {
                const index = parseInt(labelDiv.getAttribute('data-index'), 10);
                activeIndex = index;
                inputName.value = radarData[index].name;
                inputValue.value = Math.floor(radarData[index].value * 100);
                settingBox.classList.add('active');
                
                setTimeout(() => inputName.focus(), 50);
            });
        });

        function closeSetting() {
            settingBox.classList.remove('active');
            activeIndex = null;
        }

        btnCancel.addEventListener('click', closeSetting);

        function handleConfirm() {
            if (activeIndex === null) return;
            let nameVal = inputName.value.trim();
            let numVal = parseInt(inputValue.value, 10);

            if (nameVal === "") {
                alert("维度名称不能为空！");
                return;
            }

            if (!isNaN(numVal) && numVal >= 0 && numVal <= 100) {
                radarData[activeIndex].name = nameVal;
                radarData[activeIndex].value = numVal / 100;
                
                const labelNode = document.querySelector(`.label-${activeIndex}`);
                if (labelNode) {
                    labelNode.querySelector('.label-txt').innerText = nameVal;
                    labelNode.querySelector('.label-val').innerText = numVal + '%';
                }
                closeSetting();
            } else {
                alert("占比请输入 0 到 100 之间的整数！");
            }
        }

        btnConfirm.addEventListener('click', handleConfirm);

        // 键盘输入限制与提交
        inputValue.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleConfirm();
            if (e.key === 'Escape') closeSetting();
            const isNumber = /^[0-9]$/.test(e.key);
            const isControl = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Tab'].includes(e.key);
            if (!isNumber && !isControl) e.preventDefault();
        });

        inputName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleConfirm();
            if (e.key === 'Escape') closeSetting();
        });

        // 渲染引擎
        function draw() {
            // clearRect 在透明背景下会完美清除上一帧，不会留下任何残留颜色痕迹
            ctx.clearRect(0, 0, size, size);

            // 1. 数据缓动追赶
            const step = 0.02;
            radarData.forEach(item => {
                if (Math.abs(item.curValue - item.value) > step) {
                    item.curValue += item.curValue < item.value ? step : -step;
                } else {
                    item.curValue = item.value;
                }
            });

            // 2. 绘制3层蛛网背景网格
            const levelCount = 3;
            for (let i = levelCount; i > 0; i--) {
                const r = (maxRadius / levelCount) * i;
                ctx.beginPath();
                for (let j = 0; j < totalSides; j++) {
                    const angle = (Math.PI * 2 / totalSides) * j - Math.PI / 2;
                    const x = center + r * Math.cos(angle);
                    const y = center + r * Math.sin(angle);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = `rgba(0, 229, 255, ${0.15 * i})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // 3. 绘制发散骨架轴线
            ctx.beginPath();
            for (let j = 0; j < totalSides; j++) {
                const angle = (Math.PI * 2 / totalSides) * j - Math.PI / 2;
                const x = center + maxRadius * Math.cos(angle);
                const y = center + maxRadius * Math.sin(angle);
                ctx.moveTo(center, center);
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.stroke();

            // 4. 发散火星粒子特效
            if (Math.random() < 0.6) {
                particles.push(new SparkParticle());
            }
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 5. 绘制多边形覆盖面积区域
            ctx.beginPath();
            for (let j = 0; j < totalSides; j++) {
                const angle = (Math.PI * 2 / totalSides) * j - Math.PI / 2;
                const r = maxRadius * radarData[j].curValue; 
                const x = center + r * Math.cos(angle);
                const y = center + r * Math.sin(angle);
                if (j === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            
            const areaGradient = ctx.createRadialGradient(center, center, 10, center, center, maxRadius);
            areaGradient.addColorStop(0, 'rgba(0, 229, 255, 0.15)'); 
            areaGradient.addColorStop(1, 'rgba(13, 71, 161, 0.55)');
            ctx.fillStyle = areaGradient;
            ctx.fill();
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 6. 绘制顶点发光小圆点
            for (let j = 0; j < totalSides; j++) {
                const angle = (Math.PI * 2 / totalSides) * j - Math.PI / 2;
                const r = maxRadius * radarData[j].curValue;
                const x = center + r * Math.cos(angle);
                const y = center + r * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = '#00e5ff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
